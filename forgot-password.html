<!DOCTYPE html>
<html>
<head>
    <title>NexusAI — Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="assets/logo/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32x32.png">
    <link rel="apple-touch-icon" href="assets/logo/png/nexusai-app-icon-256.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="ui-glass-scrim"></div>

<div class="login-container glass-card">
    <h1>Reset Password</h1>
    <p class="muted-text" style="margin-bottom:16px;text-align:center;">Enter your email and we'll send a reset link.</p>
    <input type="email" id="email" placeholder="Enter Email">
    <div class="btn-row" style="margin-top:20px;">
        <button class="glass-btn" onclick="forgotPassword()">Send Reset Link</button>
        <button class="glass-btn" onclick="window.location.href='index.html'">Back to Login</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
