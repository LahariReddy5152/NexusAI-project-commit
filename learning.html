<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NexusAI Learning</title>
    <link rel="icon" href="assets/logo/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32x32.png">
    <link rel="apple-touch-icon" href="assets/logo/png/nexusai-app-icon-256.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="learning.css">
</head>
<body class="dashboard-body">
<div class="ui-glass-scrim"></div>
<div class="container app-shell" style="position:relative;z-index:2;min-height:100vh;display:flex;">

    <div class="sidebar">
        <h2>NexusAI</h2>
        <div id="chapterList"></div>
    </div>

    <div class="content">
        <div class="lesson-header">
            <h1 id="lessonTitle">Python Fundamentals</h1>
            <div class="progress-box">
                Progress: <span id="progressValue">0%</span>
            </div>
        </div>
        <div id="lessonContent"></div>
        <div class="lesson-actions">
            <button onclick="previousLesson()">Previous</button>
            <button onclick="markComplete()">Mark Complete</button>
            <button onclick="nextLesson()">Next</button>
        </div>
    </div>
</div>

<script src="learning.js"></script>
</body>
</html>
