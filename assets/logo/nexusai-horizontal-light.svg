<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" fill="none" role="img" aria-label="NexusAI">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="640" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="nexusTrace" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="40%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="nexusNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="nexusGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="160" rx="20" fill="url(#bgLight)"/>
  <g transform="translate(18 30)">
    <path d="M 22 78 V 26 C 22 22 24 20 28 22 C 46 34 54 66 72 78 C 76 80 78 78 78 74 V 22" stroke="url(#nexusTrace)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#nexusGlow)"/>
    <circle cx="22" cy="22" r="4.8" fill="url(#nexusNode)" stroke="#4a0012" stroke-width="1"/>
    <circle cx="22" cy="78" r="4.8" fill="url(#nexusNode)" stroke="#4a0012" stroke-width="1"/>
    <circle cx="78" cy="22" r="4.8" fill="url(#nexusNode)" stroke="#4a0012" stroke-width="1"/>
    <circle cx="78" cy="78" r="4.8" fill="url(#nexusNode)" stroke="#4a0012" stroke-width="1"/>
    <circle cx="50" cy="50" r="3.2" fill="#a855f7" stroke="#4a0012" stroke-width="0.8"/>
  </g>
  <text x="138" y="78" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="3" fill="#4a0012">NEXUS</text>
  <text x="338" y="78" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="3" fill="url(#aiGradient)">AI</text>
  <text x="140" y="112" font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="5.5" fill="#722f37">LEARN &#8226; BUILD &#8226; GROW</text>
</svg>
