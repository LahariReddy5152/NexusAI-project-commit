<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none" role="img" aria-label="NexusAI">
  <defs>
    <linearGradient id="nexusTrace" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="45%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="nexusNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="55%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="nexusGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(8 10)">
    <path d="M 22 78 V 26 C 22 22 24 20 28 22 C 46 34 54 66 72 78 C 76 80 78 78 78 74 V 22" stroke="url(#nexusTrace)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#nexusGlow)"/>
    <circle cx="22" cy="22" r="4.8" fill="url(#nexusNode)" stroke="#fdf2f8" stroke-width="1.2"/>
    <circle cx="22" cy="78" r="4.8" fill="url(#nexusNode)" stroke="#fdf2f8" stroke-width="1.2"/>
    <circle cx="78" cy="22" r="4.8" fill="url(#nexusNode)" stroke="#fdf2f8" stroke-width="1.2"/>
    <circle cx="78" cy="78" r="4.8" fill="url(#nexusNode)" stroke="#fdf2f8" stroke-width="1.2"/>
    <circle cx="50" cy="50" r="3.2" fill="#e879f9" stroke="#fdf2f8" stroke-width="1"/>
  </g>
  <text x="108" y="62" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2.5" fill="#fdf2f8">NEXUS</text>
  <text x="278" y="62" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2.5" fill="url(#aiGradient)">AI</text>
</svg>
